<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#080d14">
    <meta name="description" content="Home de apps personales - JPM">
    <title>JPM Apps</title>
 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
 
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./styles.css">
        
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="JPM Apps">
    
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div>
                <h1 class="header-title">JPM Apps</h1>
                <span class="header-sub">JPM Personal Apps</span>
            </div>
            <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">◐</button>
        </div>
    </header>
 
    <main class="container">
        <div id="loading" class="loading-state">Cargando apps...</div>
        <div id="appsList" class="apps-grid"></div>
        <div id="emptyState" class="empty-state" style="display:none;">
            <p class="empty-icon">📭</p>
            <p class="empty-text">No hay apps disponibles.</p>
            <p class="empty-hint">Agregá apps al archivo <code>apps.json</code></p>
        </div>
        <div id="errorState" class="error-state" style="display:none;">
            <p class="error-icon">⚠️</p>
            <p class="error-text">Error cargando las apps</p>
            <p class="error-detail" id="errorDetail"></p>
        </div>
    </main>
 
    <footer class="footer">
        <p class="footer-text">NewCo · Sistemas de Transporte Inteligente</p>
    </footer>
 
    <script src="./app.js"></script>
</body>
</html>
