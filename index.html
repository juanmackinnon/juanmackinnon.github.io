<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f8fafc">
    <meta name="description" content="Home de apps personales - NewCo ITS">
    
    <title>Mis Apps</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Manifest para PWA -->
    <link rel="manifest" href="./manifest.json">
    
    <!-- Estilos -->
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-content">
            <h1 class="header-title">Mis Apps</h1>
            <button id="styleToggle" class="style-toggle" aria-label="Cambiar estilo">
                <span class="toggle-icon">◐</span>
            </button>
        </div>
    </header>

    <!-- Contenedor principal -->
    <main class="container">
        
        <!-- Estado de carga -->
        <div id="loading" class="loading-state">
            Cargando apps...
        </div>

        <!-- Lista de apps -->
        <div id="appsList" class="apps-grid">
            <!-- Se rellena con JavaScript -->
        </div>

        <!-- Estado vacío -->
        <div id="emptyState" class="empty-state" style="display: none;">
            <p class="empty-icon">📭</p>
            <p class="empty-text">No hay apps disponibles aún.</p>
            <p class="empty-hint">Agregá apps al archivo <code>apps.json</code></p>
        </div>

        <!-- Error state -->
        <div id="errorState" class="error-state" style="display: none;">
            <p class="error-icon">⚠️</p>
            <p class="error-text">Error cargando las apps</p>
            <p class="error-detail" id="errorDetail"></p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer">
        <p class="footer-text">NewCo • Sistemas de Transporte Inteligente</p>
    </footer>

    <!-- Scripts -->
    <script src="./app.js"></script>
</body>
</html>
