<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#080d14">
    <meta name="description" content="AntiPro: Generá tu primer paso y destrábate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AntiPro">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%233b82f6' width='180' height='180' rx='40'/><text x='50%' y='50%' font-size='90' font-weight='700' fill='white' text-anchor='middle' dy='.3em'>A</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%233b82f6' width='180' height='180' rx='40'/><text x='50%' y='50%' font-size='90' font-weight='700' fill='white' text-anchor='middle' dy='.3em'>A</text></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
    <title>AntiPro</title>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="header-left">
                <a href="../" class="btn-back" title="Volver al menú principal">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    <span>Menú</span>
                </a>
                <h1 class="app-title">AntiPro</h1>
            </div>
            <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema" title="Cambiar tema">◐</button>
        </div>
    </header>

    <main class="main">
        <!-- Input de tarea -->
        <section class="section input-section">
            <label for="taskInput" class="label">¿Qué tenés que hacer?</label>
            <input
                type="text"
                id="taskInput"
                class="input"
                placeholder="Ej: Escribir el informe de ventas"
                autocomplete="off"
            >
            <button id="generateBtn" class="btn btn-primary">Generar primer paso</button>

            <div class="quick-examples" id="quickExamples">
                <p class="quick-examples-label">O probá con estos:</p>
                <div class="examples-grid">
                    <button class="example-btn" data-task="Hacer la presentación de clientes">Presentación</button>
                    <button class="example-btn" data-task="Revisar el código del backend">Code review</button>
                    <button class="example-btn" data-task="Planificar la reunión de equipo">Reunión</button>
                    <button class="example-btn" data-task="Actualizar la documentación">Docs</button>
                </div>
            </div>
        </section>

        <!-- Paso actual -->
        <section id="stepSection" class="section step-section hidden">
            <div class="step-container">
                <div class="step-header">
                    <span class="step-label">Paso actual</span>
                    <span class="step-counter" id="stepCounter">1/1</span>
                </div>
                <div class="step-content">
                    <h2 id="stepText" class="step-text"></h2>
                    <p id="taskTitle" class="task-title"></p>
                </div>

                <div class="timer-section">
                    <div class="timer-display" id="timerDisplay">5:00</div>
                    <p class="timer-label">minutos de foco</p>
                </div>

                <div class="action-buttons">
                    <button id="startBtn" class="btn btn-secondary">
                        <span class="btn-icon">▶</span> Empezar
                    </button>
                    <button id="stuckBtn" class="btn btn-warning">
                        <span class="btn-icon">⚡</span> Estoy trabado
                    </button>
                    <button id="doneBtn" class="btn btn-success">
                        <span class="btn-icon">✓</span> Listo
                    </button>
                </div>
            </div>
        </section>

        <!-- Historial -->
        <section id="historySection" class="section history-section hidden">
            <h3 class="section-title">Pasos completados</h3>
            <div id="historyList" class="history-list"></div>
            <button id="clearHistoryBtn" class="btn btn-text">Limpiar historial</button>
        </section>
    </main>

    <footer class="footer">
        <p class="footer-text">AntiPro · Primer paso ya</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
