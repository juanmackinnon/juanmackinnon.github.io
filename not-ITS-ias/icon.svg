<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect fill="url(#bg)" width="192" height="192" rx="40"/>

  <!-- Road / signal node (center) -->
  <circle cx="96" cy="96" r="28" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <circle cx="96" cy="96" r="8" fill="#3b82f6"/>

  <!-- Connection lines (V2X / network spokes) -->
  <line x1="96" y1="68" x2="96" y2="30"  stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="120" y1="78" x2="152" y2="52" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="124" y1="96" x2="162" y2="96" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="120" y1="114" x2="152" y2="140" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="96" y1="124" x2="96" y2="162" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="72" y1="114" x2="40" y2="140" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="68" y1="96" x2="30" y2="96"   stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>
  <line x1="72" y1="78" x2="40" y2="52"   stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 3"/>

  <!-- Node dots -->
  <circle cx="96"  cy="28"  r="5" fill="#10b981"/>
  <circle cx="154" cy="50"  r="5" fill="#f59e0b"/>
  <circle cx="164" cy="96"  r="5" fill="#3b82f6"/>
  <circle cx="154" cy="142" r="5" fill="#10b981"/>
  <circle cx="96"  cy="164" r="5" fill="#f59e0b"/>
  <circle cx="38"  cy="142" r="5" fill="#3b82f6"/>
  <circle cx="28"  cy="96"  r="5" fill="#10b981"/>
  <circle cx="38"  cy="50"  r="5" fill="#f59e0b"/>
</svg>
