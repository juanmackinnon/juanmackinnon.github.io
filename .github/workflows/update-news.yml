name: Update News

on:
  schedule:
    # 3x per day: 06:00, 13:00, 19:00 UTC
    - cron: '0 6 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Fetch news
        run: python fetch_news.py

      - name: Commit news.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          if git diff --cached --quiet; then
            echo "No changes to news.json — skipping commit"
          else
            git commit -m "chore: update news.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
